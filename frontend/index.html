<!DOCTYPE html>
<html>
<head>
<title>TalentMatch</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

/* 🌈 Animated Background */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(-45deg, #667eea, #764ba2, #6b8cff, #a084ee);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
    text-align: center;
}

/* Background animation */
@keyframes gradientBG {
    0% { background-position: 0% 50%;}
    50% { background-position: 100% 50%;}
    100% { background-position: 0% 50%;}
}

/* Heading */
h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 2.5rem;
    margin-top: 40px;
    animation: fadeDown 1s ease;
}

/* Glass Card */
.container {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    width: 420px;
    margin: 40px auto;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    animation: fadeUp 1s ease;
}

/* Input */
input {
    margin-top: 10px;
}

/* Button */
button {
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #ffffff;
    color: #333;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.07);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* Loader */
.loader {
    display: none;
    margin-top: 20px;
}

.loader div {
    width: 10px;
    height: 10px;
    background: white;
    margin: 3px;
    display: inline-block;
    border-radius: 50%;
    animation: bounce 0.6s infinite alternate;
}

.loader div:nth-child(2) { animation-delay: 0.2s; }
.loader div:nth-child(3) { animation-delay: 0.4s; }

/* Result Cards */
.result-card {
    background: rgba(255,255,255,0.15);
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    animation: fadeIn 0.5s ease;
}

/* Animations */
@keyframes fadeUp {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
}

@keyframes fadeDown {
    from {opacity:0; transform: translateY(-20px);}
    to {opacity:1; transform: translateY(0);}
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes bounce {
    to { transform: translateY(-8px);}
}

/* Result section */
.result {
    margin-top: 20px;
    text-align: left;
    max-height: 300px;
    overflow-y: auto;
}
/* Upload Box */
.upload-box {
    border: 2px dashed rgba(255,255,255,0.6);
    padding: 30px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 15px;
    backdrop-filter: blur(10px);
}

/* Hover effect */
.upload-box:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.03);
    border-color: white;
}

/* Highlight browse text */
.upload-box span {
    color: #fff;
    font-weight: bold;
    text-decoration: underline;
}

/* File name */
#file-name {
    margin-top: 10px;
    font-size: 0.9rem;
    opacity: 0.8;
}

</style>

</head>

<body>

<h1>🚀 TalentMatch</h1>
<p>Smart Resume → Job Matching</p>

<div class="container">

    <div class="upload-box" onclick="document.getElementById('file').click()">
    <p>📂 Drop your resume here or <span>browse</span></p>
    <p id="file-name">No file selected</p>
</div>

<input type="file" id="file" hidden><br>

    <button onclick="upload()">Analyze Resume</button>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div></div><div></div><div></div>
    </div>

    <!-- Results -->
    <div id="result" class="result"></div>

</div>

<script>

async function upload() {

    let file = document.getElementById("file").files[0]

    if (!file) {
        alert("Upload a resume first!")
        return
    }

    document.getElementById("loader").style.display = "block"
    document.getElementById("result").innerHTML = ""

    let formData = new FormData()
    formData.append("file", file)

    let res = await fetch("http://localhost:8000/upload-resume", {
        method: "POST",
        body: formData
    })

    let data = await res.json()

    document.getElementById("loader").style.display = "none"

    let html = "<h3>✨ Recommendations</h3>"

    data.recommendations.forEach(job => {
        html += `
            <div class="result-card">
                <b>Job ID:</b> ${job.job_id} <br>
                <b>Score:</b> ${job.score} <br>
                <b>Matched:</b> ${job.matched_skills.join(", ")}
            </div>
        `
    })

    document.getElementById("result").innerHTML = html
}
// Show selected file name
document.getElementById("file").addEventListener("change", function() {
    let fileName = this.files[0]?.name || "No file selected"
    document.getElementById("file-name").innerText = fileName
})
let box = document.querySelector(".upload-box")

box.addEventListener("dragover", (e) => {
    e.preventDefault()
    box.style.background = "rgba(255,255,255,0.25)"
})

box.addEventListener("dragleave", () => {
    box.style.background = ""
})

box.addEventListener("drop", (e) => {
    e.preventDefault()
    document.getElementById("file").files = e.dataTransfer.files

    let fileName = e.dataTransfer.files[0].name
    document.getElementById("file-name").innerText = fileName

    box.style.background = ""
})

</script>

</body>
</html>
